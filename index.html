<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- 📱 MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    #lock {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 200px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- 💖 MAIN CONTENT -->
  <div id="content">
    <h1>Hello Love of Mine ❤️</h1>

    <div id="randomContent">💖</div>

    <button onclick="showRandom()">Show me how loved I am</button>
  </div>

  <!-- 🧠 SCRIPT -->
  <script>
    // 💬 First message shown after unlock
    const surprises = [
      "I love you more than yesterday 💌",
      "Thinking about you right now ❤️",
      "You make my world brighter ✨",
      "I’m so lucky to have you 💕"
    ];

    // 🌐 Pages for button clicks
    const pages = [
      "page1.html",
      "page2.html",
      "page3.html"
    ];

    function checkPass() {
      const correct = "112225";
      const input = document.getElementById("passcode").value;

      if (input === correct) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("content").style.display = "block";

        const randomMessage = surprises[Math.floor(Math.random() * surprises.length)];
        document.getElementById("randomContent").innerHTML = `<p>${randomMessage}</p>`;
      } else {
        document.getElementById("error").innerText = "Wrong passcode 💔";
      }
    }

    function showRandom() {
      const randomPage = pages[Math.floor(Math.random() * pages.length)];
      window.location.href = randomPage;
    }

    // ⌨️ PRESS ENTER TO UNLOCK
    document.getElementById("passcode").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkPass();
      }
    });

    // 🎯 AUTO-FOCUS INPUT
    window.onload = function() {
      document.getElementById("passcode").focus();
    };
  </script>

</body>
</html>
