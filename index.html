<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #000;
      color: #0f0;
      padding: 40px;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
    }

    img, video {
      max-width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- 💖 MAIN CONTENT -->
  <div id="content">
    <h1>Hello Love of Mine ❤️</h1>

    <p>
      I made this just for you.  
      Tap below whenever you need a reminder that you are loved.
    </p>

    <div id="randomContent"></div>

    <button onclick="showRandom()">Show Surprise 💖</button>
  </div>

  <!-- 🧠 SCRIPT -->
  <script>
    const surprises = [
      { type: "text", value: "I love you more than yesterday 💌" },
      { type: "text", value: "Thinking about you right now ❤️" },
      { type: "image", value: "Test photo.JPG" },
      { type: "audio", value: "TestAudio.m4a" },
      { type: "video", value: "TestVideo.MOV" }
    ];

    function checkPass() {
      const correct = "112225";
      const input = document.getElementById("passcode").value;

      if (input === correct) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("content").style.display = "block";
        showRandom();
      } else {
        document.getElementById("error").innerText = "Wrong passcode 💔";
      }
    }

    function showRandom() {
      const random = surprises[Math.floor(Math.random() * surprises.length)];
      const container = document.getElementById("randomContent");

      if (random.type === "text") {
        container.innerHTML = `<p>${random.value}</p>`;
      }

      if (random.type === "image") {
        container.innerHTML = `<img src="${random.value}">`;
      }

      if (random.type === "audio") {
        container.innerHTML = `
          <audio controls autoplay>
            <source src="${random.value}" type="audio/mpeg">
          </audio>
        `;
      }

      if (random.type === "video") {
        container.innerHTML = `
          <video controls autoplay>
            <source src="${random.value}" type="video/mp4">
          </video>
        `;
      }
    }
  </script>

</body>
</html>
