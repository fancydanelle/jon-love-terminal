<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: white;
      color: black;
      padding: 40px;
      margin: 0;
    }

    #lock {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 25px;
      border-radius: 20px;
      max-width: 400px;
      margin: 40px auto;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode for a special surprise 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- 💖 MAIN CONTENT -->
  <div id="content">
    <h1>Hello Love of Mine ❤️</h1>

    <div id="randomContent">💖 Loading surprise...</div>

    <button onclick="showRandom()">I'm ready for my next surprise 💖</button>
  </div>

  <!-- 🧠 SCRIPT -->
  <script>
    // 💬 First message shown after unlock
    const surprises = [
      "I love you more than yesterday 💌",
      "Thinking about you right now ❤️",
      "You make my world brighter ✨",
      "I’m so lucky to have you 💕"
    ];

    // 🌐 Pages for button clicks
    const pages = [
      "page1.html",
      "page2.html",
      "page3.html"
    ];

    function checkPass() {
      const correct = "112225";
      const input = document.getElementById("passcode").value;

      if (input === correct) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("content").style.display = "block";

        // show a random love message first
        const randomMessage = surprises[Math.floor(Math.random() * surprises.length)];
        document.getElementById("randomContent").innerHTML = `<p>${randomMessage}</p>`;
      } else {
        document.getElementById("error").innerText = "Wrong passcode 💔";
      }
    }

    function showRandom() {
      const randomPage = pages[Math.floor(Math.random() * pages.length)];
      window.location.href = randomPage;
    }
  </script>

</body>
</html>
