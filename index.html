<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #000;
      color: #0f0;
      padding: 40px;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 20px;
      border-radius: 20px;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      max-width: 300px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- 💖 HIDDEN CONTENT -->
 
  <div id="content">
    <div id=randomContent"></div>
  </div>
  
  <div id="content">
    <h1>Hello Love of Mine ❤️</h1>

    <p>
      I made this just for you.  
      Tap this whenever you need a reminder that you are loved.
    </p>

  </div>

  <!-- 🧠 SCRIPT -->
  <script>
    function checkPass() {
      const correct = "112225"; //
      const input = document.getElementById("passcode").value;

      if (input === correct) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("content").style.display = "block";
      } else {
        document.getElementById("error").innerText = "Wrong passcode 💔";
      }
    }
  </script>

</body>

  <script>
  const surprises = [

    // 💬 TEXT MESSAGE
    {
      type: "text",
      value: "I love you more than yesterday 💌"
    },

    // 🖼️ PHOTO
    {
      type: "image",
      value: "Test photo.JPG"
    },

    // 🎧 AUDIO
    {
      type: "audio",
      value: "TestAudio.m4a"
    },

    // 🎥 VIDEO
    {
      type: "video",
      value: "Test Vidoe.MOV"
    },

    // 💬 ANOTHER TEXT
    {
      type: "text",
      value: "Thinking about you right now ❤️"
    }

  ];

  function showRandom() {
    const random = surprises[Math.floor(Math.random() * surprises.length)];
    const container = document.getElementById("randomContent");

    if (random.type === "text") {
      container.innerHTML = `<p>${random.value}</p>`;
    }

    if (random.type === "image") {
      container.innerHTML = `<img src="${random.value}" style="max-width:300px;">`;
    }

    if (random.type === "audio") {
      container.innerHTML = `
        <audio controls autoplay>
          <source src="${random.value}" type="audio/mpeg">
        </audio>
      `;
    }

    if (random.type === "video") {
      container.innerHTML = `
        <video width="300" controls autoplay>
          <source src="${random.value}" type="video/mp4">
        </video>
      `;
    }
  }

  // Run when page loads
  showRandom();
</script>
</html>
