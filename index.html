<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    #lock {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
    }

    #randomContent {
      margin-bottom: 15px;
      font-size: 16px;
      line-height: 1.4;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 200px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>


 <script>
  const pages = [
    "page1.html",
    "page2.html",
    "page3.html"
  ];

  function checkPass() {
    const correct = "112225";
    const input = document.getElementById("passcode").value;

    if (input === correct) {
      handleUnlock();
    } else {
      document.getElementById("error").innerText = "Wrong passcode 💔";
    }
  }

  function handleUnlock() {
    const today = new Date().toDateString();
    const lastOpen = localStorage.getItem("lastOpenDate");

    // 🚫 BLOCK if already opened today
    if (lastOpen === today) {
      document.getElementById("error").innerText = "You've already opened today's message 💖";
      return;
    }

    goToNextPage();
  }

  function goToNextPage() {
    let viewedPages = JSON.parse(localStorage.getItem("viewedPages")) || [];
    let currentPage = parseInt(localStorage.getItem("currentPage")) || 0;

    // If all pages viewed → reset
    if (viewedPages.length >= pages.length) {
      viewedPages = [];
      currentPage = 0;
    }

    // Find next unviewed page
    while (viewedPages.includes(currentPage)) {
      currentPage++;
      if (currentPage >= pages.length) currentPage = 0;
    }

    const nextPage = pages[currentPage];

    // Save progress
    viewedPages.push(currentPage);
    localStorage.setItem("viewedPages", JSON.stringify(viewedPages));
    localStorage.setItem("currentPage", currentPage + 1);
    localStorage.setItem("lastOpenDate", new Date().toDateString());

    // 🚀 Redirect
    window.location.href = nextPage;
  }

  window.onload = function () {
    const input = document.getElementById("passcode");

    input.focus();

    input.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkPass();
      }
    });
  };
</script>
