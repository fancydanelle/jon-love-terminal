<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>For You ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    #lock {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #content {
      display: none;
      background-color: #fff0f5;
      color: black;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
    }

    #randomContent {
      margin-bottom: 15px;
      font-size: 16px;
      line-height: 1.4;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 200px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
    }
  </style>
</head>

<body>

  <!-- 🔒 LOCK SCREEN -->
  <div id="lock">
    <h2>Enter Passcode 💌</h2>
    <input type="password" id="passcode" placeholder="••••">
    <br>
    <button onclick="checkPass()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- 💖 MAIN CONTENT -->
  <div id="content">
    <div id="randomContent">
      Click to reveal a one-time-view-message-that-will-self-destruct from me 💖
    </div>

    <button onclick="showRandom()">OPEN</button>
  </div>

  <script>
    const pages = [
      "page1.html",
      "page2.html",
      "page3.html"
    ];

    function checkPass() {
      const correct = "112225";
      const input = document.getElementById("passcode").value;

      if (input === correct) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("content").style.display = "block";
      } else {
        document.getElementById("error").innerText = "Wrong passcode 💔";
      }
    }

    function showRandom() {
      const randomPage = pages[Math.floor(Math.random() * pages.length)];
      window.location.href = randomPage;
    }

    window.onload = function () {
      const input = document.getElementById("passcode");

      input.focus();

      input.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
          checkPass();
        }
      });
    };
  </script>

</body>
</html>
